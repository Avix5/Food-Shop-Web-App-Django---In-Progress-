{% extends 'myapp/base.html' %}
{% block body %}

<div class="m-10 flex">
    <div>
        <img class="w-128 rounded-lg" src="{{item.item_image}}" alt="">
    </div>
    <div class="mx-40 space-y-5">
        <div class="font-bold text-4xl">{{item.item_name}}</div>
        <div class="text-green-700 font-bold text-2xl">${{item.item_price}}</div>
        <div>{{item.item_desc}}</div>
        <a class="bg-yellow-600 px-4 py-2 rounded-md font-bold text-white " href="">Edit</a>
        <a class="bg-red-600 px-4 py-2 rounded-md font-bold text-white "  href="">Delete</a>
    </div>
</div>

{% endblock %}
